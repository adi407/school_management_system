spring:
  application:
    name: school-management-system

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sms_db}
    username: ${SPRING_DATASOURCE_USERNAME:sms_user}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
          fetch_size: 100
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 2000ms

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

  mail:
    host: ${MAIL_HOST:smtp.resend.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:resend}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10 minutes

jwt:
  secret: ${JWT_SECRET:SMS_SUPER_SECRET_KEY_MUST_BE_AT_LEAST_32_CHARS_LONG_FOR_HS256}
  access-expiry-minutes: ${JWT_ACCESS_EXPIRY_MINUTES:15}
  refresh-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:7}

aws:
  s3:
    endpoint: ${AWS_S3_ENDPOINT:http://localhost:9000}
    access-key: ${AWS_S3_ACCESS_KEY:minioadmin}
    secret-key: ${AWS_S3_SECRET_KEY:minioadmin}
    bucket: ${AWS_S3_BUCKET:sms-documents}
    region: ${AWS_S3_REGION:us-east-1}
    presign-expiry-minutes: ${AWS_S3_PRESIGN_EXPIRY_MINUTES:15}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs
  show-actuator: false

logging:
  level:
    com.sms: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized

server:
  port: 8081
  compression:
    enabled: true
    mime-types: application/json,text/html

app:
  email:
    from: ${EMAIL_FROM:noreply@schoolmanager.live}
    admin-to: ${EMAIL_ADMIN_TO:adityakumar20111@gmail.com}
    frontend-url: ${FRONTEND_URL:https://schoolmanager.live}
    enabled: ${EMAIL_ENABLED:true}
