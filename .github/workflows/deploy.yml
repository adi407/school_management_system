name: Build & Deploy to schoolmanager.live

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Backend Build ─────────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (skip tests)
        run: mvn -f backend/pom.xml clean package -DskipTests

      # ── Frontend Build ────────────────────────────────────────
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Build Angular (production)
        run: npm run build --prefix frontend -- --configuration=production

      # ── Deploy ───────────────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DROPLET_HOST }} >> ~/.ssh/known_hosts

      - name: Upload JAR
        run: |
          scp backend/sms-api/target/sms-api-*.jar \
            root@${{ secrets.DROPLET_HOST }}:/opt/sms/app/current.jar

      - name: Upload Frontend
        run: |
          rsync -avz --delete \
            frontend/dist/sms-frontend/browser/ \
            root@${{ secrets.DROPLET_HOST }}:/opt/sms/frontend/

      - name: Restart & Verify
        run: |
          ssh root@${{ secrets.DROPLET_HOST }} "
            systemctl restart sms
            echo 'Waiting for startup...'
            sleep 15
            if systemctl is-active --quiet sms; then
              echo '✅ Backend is running'
            else
              echo '❌ Backend failed to start — last 50 log lines:'
              tail -50 /opt/sms/app/app.log
              exit 1
            fi
            systemctl reload nginx
            echo '✅ Nginx reloaded'
          "

      - name: Health Check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://schoolmanager.live/api/actuator/health)
          if [ "$STATUS" = "200" ]; then
            echo "✅ LIVE at https://schoolmanager.live (HTTP $STATUS)"
          else
            echo "⚠️ Health check returned HTTP $STATUS — check /opt/sms/app/app.log"
          fi
