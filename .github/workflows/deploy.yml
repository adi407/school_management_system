name: Build & Deploy to schoolmanager.live

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Backend Build ─────────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (skip tests)
        run: mvn -f backend/pom.xml clean package -DskipTests

      # ── Frontend Build ────────────────────────────────────────
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Build Angular (production)
        run: npm run build --prefix frontend -- --configuration=production

      # ── Deploy ───────────────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DROPLET_HOST }} >> ~/.ssh/known_hosts

      - name: Upload JAR
        run: |
          scp backend/sms-api/target/sms-api-*.jar \
            root@${{ secrets.DROPLET_HOST }}:/opt/sms/app/current.jar

      - name: Upload Frontend
        run: |
          rsync -avz --delete \
            frontend/dist/sms-frontend/browser/ \
            root@${{ secrets.DROPLET_HOST }}:/opt/sms/frontend/

      - name: Upload & restore seed data
        run: |
          scp database/seed_data.sql \
            root@${{ secrets.DROPLET_HOST }}:/opt/sms/app/seed_data.sql
          ssh root@${{ secrets.DROPLET_HOST }} 'bash -s' << 'ENDSSH'
          CONFIG=/opt/sms/app/application-prod.yml
          # Revert ddl-auto to update (in case previous deploy changed it)
          sed -i "s/ddl-auto: validate/ddl-auto: update/" "$CONFIG"
          # Disable Flyway — seed data is handled by this script
          sed -i "/flyway:/,/enabled:/{s/enabled: true/enabled: false/}" "$CONFIG"
          # Drop failed flyway history so it doesn't block future startups
          DB_PASS=$(grep "password:" "$CONFIG" | head -1 | awk '{print $2}')
          PGPASSWORD="$DB_PASS" psql -U sms_user -d sms_db -c "DROP TABLE IF EXISTS flyway_schema_history;" 2>/dev/null || true
          # Restore seed data (ON CONFLICT DO NOTHING = idempotent)
          PGPASSWORD="$DB_PASS" psql -U sms_user -d sms_db -f /opt/sms/app/seed_data.sql 2>&1 | tail -5
          PGPASSWORD="$DB_PASS" psql -U sms_user -d sms_db -c "SELECT count(*) AS users FROM users; SELECT count(*) AS students FROM students;"
          echo "Seed data restored"
          ENDSSH

      - name: Configure email on server
        run: |
          ssh root@${{ secrets.DROPLET_HOST }} bash << ENDSSH
            echo 'MAIL_PASSWORD=${{ secrets.RESEND_API_KEY }}' > /opt/sms/app/.env
            CONFIG=/opt/sms/app/application-prod.yml
            # Add Resend SMTP config if not already present
            if ! grep -q "smtp.resend.com" "\$CONFIG"; then
              sed -i '/# ── Disable Mail/,/enable: false/c\\
  # ── Resend SMTP ─────────────────────────────────────────────\\n\
  mail:\\n\
    host: smtp.resend.com\\n\
    port: 465\\n\
    username: resend\\n\
    password: \${MAIL_PASSWORD}\\n\
    properties:\\n\
      mail:\\n\
        smtp:\\n\
          auth: true\\n\
          ssl:\\n\
            enable: true' "\$CONFIG"
            fi
            # Add app.email block if not already present
            if ! grep -q "app:" "\$CONFIG"; then
              cat >> "\$CONFIG" << 'BLOCK'

app:
  email:
    from: noreply@schoolmanager.live
    admin-to: adityakumar20111@gmail.com
    frontend-url: https://schoolmanager.live
    enabled: true
BLOCK
            fi
          ENDSSH

      - name: Restart & Verify
        run: |
          ssh root@${{ secrets.DROPLET_HOST }} bash << 'ENDSSH'
            pkill -9 -f current.jar || true
            sleep 5
            > /opt/sms/app/app.log
            set -a; source /opt/sms/app/.env; set +a
            nohup java -Xms256m -Xmx512m -jar /opt/sms/app/current.jar \
              --spring.profiles.active=prod \
              --spring.config.additional-location=file:/opt/sms/app/application-prod.yml \
              > /opt/sms/app/app.log 2>&1 &
            echo "Started PID $!"
            for i in $(seq 1 24); do
              sleep 10
              if grep -q "Started SmsApplication" /opt/sms/app/app.log; then
                echo "Backend is running after ${i}0s"
                break
              fi
              if grep -q "APPLICATION FAILED TO START" /opt/sms/app/app.log; then
                echo "Backend failed to start:"
                tail -40 /opt/sms/app/app.log
                exit 1
              fi
              echo "Waiting... (${i}0s)"
            done
            grep -q "Started SmsApplication" /opt/sms/app/app.log || { tail -40 /opt/sms/app/app.log; exit 1; }
            nginx -s reload
            echo "Nginx reloaded"
          ENDSSH

      - name: Health Check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://schoolmanager.live/api/v1/actuator/health)
          if [ "$STATUS" = "200" ]; then
            echo "LIVE at https://schoolmanager.live (HTTP $STATUS)"
          else
            echo "Health check returned HTTP $STATUS — check /opt/sms/app/app.log"
          fi
